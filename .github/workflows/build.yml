name: Build Plugin

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Скачать код
        uses: actions/checkout@v4

      - name: Установить Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Собрать плагин через Maven
        run: mvn package -B

      - name: Загрузить JAR как артефакт
        uses: actions/upload-artifact@v4
        with:
          name: LifeOnDeath-jar
          path: target/LifeOnDeath-*.jar
